<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaixus Systems | Autonomous Infrastructure</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --accent-blue: #007aff;
            --accent-glow: rgba(0, 122, 255, 0.3);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --text-main: #e0e0e0;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Keeps it feeling like a dashboard */
        }

        /* Subtle Neural Grid Background */
        .grid-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 122, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 122, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        .container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100vh; text-align: center;
            padding: 20px;
        }

        /* The Glass Fortress Box */
        .hero-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 60px; border-radius: 24px;
            box-shadow: 0 0 50px var(--accent-glow);
            max-width: 800px;
        }

        .logo-v {
            font-family: 'JetBrains Mono', monospace;
            font-size: 3rem; font-weight: 700;
            background: linear-gradient(180deg, #fff, var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px; letter-spacing: -2px;
        }

        h1 {
            font-size: 2.5rem; letter-spacing: -1px; margin: 10px 0;
            font-weight: 700;
        }

        .typing-text {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-blue); font-size: 1rem;
            margin-bottom: 30px; height: 20px;
        }

        .cta-group {
            margin-top: 40px;
        }

        input[type="email"] {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333; color: white;
            padding: 15px 25px; border-radius: 8px;
            width: 250px; outline: none;
            transition: 0.3s;
        }

        input[type="email"]:focus { border-color: var(--accent-blue); }

        button {
            background: var(--accent-blue);
            color: white; border: none;
            padding: 15px 30px; border-radius: 8px;
            font-weight: 700; cursor: pointer;
            transition: 0.3s; margin-left: 10px;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--accent-glow); }

        .footer {
            position: absolute; bottom: 30px; font-size: 0.8rem;
            color: #555; letter-spacing: 1px;
        }

        /* 3D placeholder for Brother's Blender render */
        .visual-anchor {
            width: 200px; height: 200px; margin: 0 auto 30px auto;
            border-radius: 50%; border: 1px dashed var(--accent-blue);
            display: flex; align-items: center; justify-content: center;
            color: var(--accent-blue); font-size: 0.7rem;
            animation: pulse 4s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.5; }
        }
    </style>
</head>
<body>

<div class="grid-overlay"></div>

<div class="container">
    <div class="hero-card">
        <div class="visual-anchor">
            [ BLENDER 3D CORE INCOMING ]
        </div>
        <div class="logo-v">VAIXUS</div>
        <h1>Autonomous Supply Chain Infrastructure</h1>
        <div class="typing-text" id="typewriter"></div>

        <p style="color: #888; line-height: 1.6; max-width: 600px; margin: 0 auto;">
            Engineering the intelligent core of global B2B logistics. <br>
            Bridging complex data and industrial action via neural automation.
        </p>

        <div class="cta-group">
            <input type="email" placeholder="Enter B2B Email">
            <button>Request Alpha Access</button>
        </div>
    </div>

    <div class="footer">
        © 2026 VAIXUS SYSTEMS | TIRUPPUR • CHENNAI • GLOBAL
    </div>
</div>

<script>
    const text = "Initializing AI Agents... Optimizing Logistics... Securing Infrastructure...";
    let i = 0;
    function typeWriter() {
        if (i < text.length) {
            document.getElementById("typewriter").innerHTML += text.charAt(i);
            i++;
            setTimeout(typeWriter, 50);
        } else {
            setTimeout(() => { document.getElementById("typewriter").innerHTML = ""; i = 0; typeWriter(); }, 3000);
        }
    }
    typeWriter();
</script>

</body>
</html>
